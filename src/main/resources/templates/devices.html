<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Device Management</title>

<style>
body{
    font-family:Arial;
    background:#f4f4f4;
    margin:0;
    padding:30px;
}

.container{
    width:95%;
    margin:auto;
}

h2{
    color:#d60000;
}

.card{
    background:white;
    padding:20px;
    border-radius:8px;
    margin-bottom:25px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

form{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

input,select{
    padding:10px;
    width:100%;
}

button{
    grid-column:span 2;
    padding:12px;
    background:red;
    color:white;
    border:none;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:10px;
    border:1px solid #ddd;
    text-align:center;
}

th{
    background:red;
    color:white;
}

.edit{
    background:green;
    color:white;
    padding:6px 10px;
    text-decoration:none;
}

.delete{
    background:red;
    color:white;
    padding:6px 10px;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

<h2>Device Management</h2>

<div class="card">

<form th:action="@{/saveDevice}" method="post" th:object="${device}">

<input type="hidden" th:field="*{id}">

<input type="text" th:field="*{serialNumber}" placeholder="Serial Number" required>

<select th:field="*{type}">
    <option value="">Select Type</option>
    <option value="Laptop">Laptop</option>
    <option value="Desktop">Desktop</option>
    <option value="Phone">Phone</option>
    <option value="Tablet">Tablet</option>
</select>

<input type="text" th:field="*{brand}" placeholder="Brand">

<input type="text" th:field="*{model}" placeholder="Model">

<select th:field="*{conditionStatus}">
    <option value="">Condition</option>
    <option value="Good">Good</option>
    <option value="Faulty">Faulty</option>
    <option value="Repair">Repair</option>
</select>

<select th:field="*{status}">
    <option value="">Status</option>
    <option value="Available">Available</option>
    <option value="Assigned">Assigned</option>
    <option value="Lost">Lost</option>
</select>

<input type="date" th:field="*{purchaseDate}">

<button type="submit">Save Device</button>

</form>

</div>

<div class="card">

<table>

<tr>
<th>ID</th>
<th>Serial</th>
<th>Type</th>
<th>Brand</th>
<th>Model</th>
<th>Condition</th>
<th>Status</th>
<th>Date</th>
<th>Action</th>
</tr>

<tr th:each="d : ${devices}">
<td th:text="${d.id}"></td>
<td th:text="${d.serialNumber}"></td>
<td th:text="${d.type}"></td>
<td th:text="${d.brand}"></td>
<td th:text="${d.model}"></td>
<td th:text="${d.conditionStatus}"></td>
<td th:text="${d.status}"></td>
<td th:text="${d.purchaseDate}"></td>

<td>
<a th:href="@{/editDevice/{id}(id=${d.id})}" class="edit">Edit</a>
<a th:href="@{/deleteDevice/{id}(id=${d.id})}" class="delete"
onclick="return confirm('Delete this device?')">Delete</a>
</td>

</tr>

</table>

</div>

</div>

</body>
</html>
