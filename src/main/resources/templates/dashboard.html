<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Airtel Inventory Management System</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background: #f4f6f9;
        text-align: center;
    }

    h1 {
        background: #d90429;
        color: white;
        padding: 20px;
        margin: 0;
        font-size: 28px;
        letter-spacing: 1px;
    }

    ul {
        list-style: none;
        padding: 0;
        margin-top: 50px;
    }

    ul li {
        margin: 20px 0;
    }

    ul li a {
        text-decoration: none;
        background: #2b2d42;
        color: white;
        padding: 12px 30px;
        border-radius: 8px;
        font-size: 18px;
        transition: 0.3s;
        display: inline-block;
        width: 200px;
    }

    ul li a:hover {
        background: #ef233c;
        transform: scale(1.05);
    }

    footer {
        margin-top: 60px;
        padding: 15px;
        background: #2b2d42;
        color: white;
        font-size: 14px;
    }
</style>

</head>

<body>

<ul>
    <li><a href="users">User</a></li>
    <li><a href="/devices">Device</a></li>

</html>
